name: CI / Deploy

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: false

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm install

            - name: Build Tailwind CSS
              run: npm run build:css

            - name: Run unit tests
              run: npm run test:unit

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run smoke tests
              run: npm run test:smoke

    deploy:
        needs: test
        if: (github.ref == 'refs/heads/master') && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Install dependencies
              run: npm install

            - name: Build Tailwind CSS
              run: npm run build:css

            - name: Prepare artifact
              run: |
                  mkdir artifact
                  shopt -s extglob
                  cp -R !(artifact) artifact/
                  rm -rf artifact/node_modules
                  rm -rf artifact/src
                  rm -rf artifact/tests
                  rm -f  artifact/playwright.config.js
                  rm -f  artifact/playwright.config.cjs
                  rm -f  artifact/tailwind.config.js
                  rm -f  artifact/package.json
                  rm -f  artifact/package-lock.json
              shell: bash

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: './artifact'

            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
