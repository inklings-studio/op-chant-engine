<!DOCTYPE html>
<html lang="sk">

<head>
  <meta charset="UTF-8" />
  <!--
    IMPORTANT: Open via HTTP server, NOT file://.
    Exsurge uses Canvas for text measurement; Web Audio requires a real origin.
    Run: http-server -a localhost -p 8080 --no-cache
    Then open: http://localhost:8080/v2/psalms.html
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Psalm Tone Pointer — v2</title>

  <link rel="stylesheet" href="css/output.css" />
  <link rel="stylesheet" href="css/transcriber.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet" />

  <!--
    Global libraries must load as classic scripts before the ES6 module.
    Order: Tone → tones (audio) → exsurge (rendering) → saveSvgAsPng (export)
  -->
  <script src="../js/Tone.min.js"></script>
  <script src="../js/tones.js"></script>
  <script src="../exsurge.min.js"></script>
  <script src="../saveSvgAsPng.js"></script>
</head>

<body class="h-screen flex flex-col bg-white text-gray-900 overflow-hidden">

  <!-- TOOLBAR -->
  <header class="flex-none flex items-center justify-between px-4 py-2 border-b border-gray-200 bg-gray-50">
    <h1 class="text-sm font-semibold text-gray-700 tracking-wide uppercase">
      Psalm Tone Pointer
      <span class="ml-2 text-xs font-normal text-gray-400">v2</span>
    </h1>
    <div class="flex items-center gap-2">
      <button id="btnDownloadPng"
        class="px-3 py-1 text-xs font-medium rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-colors">
        PNG
      </button>
      <button id="btnDownloadSvg"
        class="px-3 py-1 text-xs font-medium rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-colors">
        SVG
      </button>
    </div>
  </header>

  <!-- TWO-PANE LAYOUT -->
  <main class="flex-1 flex overflow-hidden">

    <!-- Editor pane -->
    <section class="w-2/5 flex flex-col border-r border-gray-200 min-w-0">

      <!-- Tab bar -->
      <div class="flex-none flex border-b border-gray-200 bg-gray-50">
        <button id="tabEditorBtn"
          class="tab-btn tab-btn-active px-4 py-2 text-xs font-medium border-b-2 border-blue-500 text-gray-700">
          Editor
        </button>
        <button id="tabGabcBtn"
          class="tab-btn px-4 py-2 text-xs font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
          GABC
        </button>
      </div>

      <!-- Tab 1: Structured editor -->
      <div id="editorTab" class="flex-1 flex flex-col overflow-y-auto p-3 min-w-0">

        <!-- Controls row 1: Language/Psalm/Annotation (left) | Tone/Termination/Solemn (right) -->
        <div class="pb-3 mb-0 border-b border-gray-200 flex items-start w-full">
          <!-- Left grid: Language, Psalm, Annotation -->
          <div style="display:grid; grid-template-columns:auto auto; gap:6px 8px; align-items:center;">
            <span class="text-xs text-gray-600 text-right">Language</span>
            <select id="editorLang" class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <!-- options populated by editor.js from language registry -->
            </select>
            <span id="psalmSelectLabel" class="text-xs text-gray-600 text-right hidden">Psalm</span>
            <select id="psalmSelect" class="hidden border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <option value="">— select —</option>
              <!-- options populated by editor.js from language plugin -->
            </select>
            <span class="text-xs text-gray-600 text-right">Annotation</span>
            <input type="text" id="editorAnnotation" spellcheck="false"
              class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
              placeholder="e.g. Ps." style="width:90px;" />
          </div>
          <!-- Right grid: Tone, Termination, Solemn — pushed to far right -->
          <div style="display:grid; grid-template-columns:auto auto; gap:6px 8px; align-items:center; margin-left:auto;">
            <span class="text-xs text-gray-600 text-right">Tone</span>
            <select id="editorTone" class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <!-- options populated by editor.js -->
            </select>
            <span class="text-xs text-gray-600 text-right">Termination</span>
            <select id="editorTerm" class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <!-- options populated by editor.js on tone change -->
            </select>
            <label class="text-xs text-gray-600 cursor-pointer select-none text-right" for="editorSolemn">Solemn</label>
            <input type="checkbox" id="editorSolemn" class="accent-blue-600">
          </div>
        </div>

        <!-- Controls row 2: Output selector + conditional options -->
        <div class="py-2 mb-3 border-b border-gray-200 flex items-start w-full">
          <!-- Left area: Output select + mode-specific controls -->
          <div>
            <div style="display:grid; grid-template-columns:auto auto; gap:6px 8px; align-items:center;">
              <span class="text-xs text-gray-600 text-right">Output</span>
              <select id="editorOutputMode" class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
                <option value="gabc">GABC</option>
                <option value="html">HTML</option>
              </select>
            </div>
            <!-- GABC mode: Large Initial checkbox -->
            <div id="editorGabcOptions" style="display:grid; grid-template-columns:auto auto; gap:6px 8px; align-items:center; margin-top:5px;">
              <label class="text-xs text-gray-600 cursor-pointer select-none text-right" for="editorLargeInitial">Large Initial</label>
              <input type="checkbox" id="editorLargeInitial" class="accent-blue-600" checked>
            </div>
            <!-- HTML mode: Prep begin + Acc begin (left column) -->
            <div id="editorHtmlLeft" style="display:none; grid-template-columns:auto auto; gap:4px 8px; align-items:center; margin-top:5px;">
              <span class="text-xs text-gray-500 text-right whitespace-nowrap">Prep begin</span>
              <input type="text" id="editorPrepBegin" value="&lt;i&gt;"
                class="border border-gray-300 rounded px-1 py-0.5 text-xs font-mono text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
                style="width:52px;">
              <span class="text-xs text-gray-500 text-right whitespace-nowrap">Acc begin</span>
              <input type="text" id="editorAccBegin" value="&lt;b&gt;"
                class="border border-gray-300 rounded px-1 py-0.5 text-xs font-mono text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
                style="width:52px;">
            </div>
          </div>
          <!-- Right area: HTML mode Prep end + Acc end — aligned to right column above -->
          <div id="editorHtmlRight" style="display:none; grid-template-columns:auto auto; gap:4px 8px; align-items:center; margin-left:auto; align-self:flex-end;">
            <span class="text-xs text-gray-500 text-right whitespace-nowrap">Prep end</span>
            <input type="text" id="editorPrepEnd" value="&lt;/i&gt;"
              class="border border-gray-300 rounded px-1 py-0.5 text-xs font-mono text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
              style="width:52px;">
            <span class="text-xs text-gray-500 text-right whitespace-nowrap">Acc end</span>
            <input type="text" id="editorAccEnd" value="&lt;/b&gt;"
              class="border border-gray-300 rounded px-1 py-0.5 text-xs font-mono text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
              style="width:52px;">
          </div>
        </div>

        <!-- Edit text toggle — revealed after first Build; sits between textarea and stanzas -->
        <button id="editorEditToggle"
          class="hidden mb-2 px-2 py-0.5 text-xs text-blue-600 border border-blue-300 rounded hover:bg-blue-50">
          Edit text
        </button>

        <!-- Raw text input + Build — hidden after first Build -->
        <div id="editorTextInputArea" class="flex-1 flex gap-2 mb-2">
          <textarea id="editorRawText" spellcheck="false"
            class="flex-1 min-h-24 resize-y border border-gray-300 rounded px-2 py-1.5 text-xs font-mono leading-relaxed focus:outline-none focus:ring-1 focus:ring-blue-400"
            placeholder="Paste psalm verses here… (one verse per line, * for mediant, † for flex)"></textarea>
          <div class="self-stretch flex flex-col justify-end gap-1">
            <button id="editorBuildBtn"
              class="px-3 py-2.5 bg-blue-600 text-white text-xs font-medium rounded hover:bg-blue-700 active:bg-blue-800">
              Build
            </button>
            <button id="editorRebuildBtn"
              class="hidden px-3 py-2 bg-emerald-600 text-white text-xs font-medium rounded hover:bg-emerald-700 active:bg-emerald-800"
              title="Re-syllabify new text while keeping existing melody edits">
              Re-Build
            </button>
          </div>
        </div>

        <!-- Dynamic verse rows injected here by editor.js -->
        <div id="editorStanzas" class="hidden"></div>

      </div>

      <!-- Tab 2: Generated GABC (read-only) -->
      <div id="gabcTab" class="hidden flex-1 flex flex-col min-w-0">
        <textarea id="gabcEditor" readonly spellcheck="false" autocorrect="off" autocapitalize="none"
          class="flex-1 resize-none p-3 font-mono text-sm leading-relaxed text-gray-800 bg-gray-50 focus:outline-none focus:ring-1 focus:ring-inset focus:ring-blue-400"
          placeholder="Generated GABC will appear here after Build…"></textarea>
      </div>

    </section>

    <!-- Preview pane -->
    <section class="flex-1 flex flex-col min-w-0">
      <div class="flex-none border-b border-gray-100 bg-gray-50 preview-header-row">
        <span class="text-xs font-medium text-gray-500 uppercase tracking-wide">Preview</span>
        <div id="previewControls" class="hidden flex items-center gap-1">
          <button id="btnPlayFromStart" class="toolbar-btn toolbar-btn-primary-inline">▶ Play</button>
          <button id="btnHeaderPitchUp" class="toolbar-btn toolbar-btn-success">▲</button>
          <div id="headerPitchDisplay" class="toolbar-btn toolbar-btn-info toolbar-pitch-info preview-pitch-display">—</div>
          <button id="btnHeaderPitchDown" class="toolbar-btn toolbar-btn-success">▼</button>
        </div>
        <div></div>
      </div>
      <!-- Shared scroll container for GABC SVG + HTML verses -->
      <div class="flex-1 overflow-y-auto">
        <div id="chantPreview" class="p-4">
          <p id="previewPlaceholder" class="text-sm text-gray-400 italic mt-8 text-center">
            Enter psalm verses and click Build to see a preview.
          </p>
        </div>
        <div id="versesPreview" class="hidden px-4 pb-6"></div>
      </div>
    </section>

  </main>

  <!-- STATUS BAR -->
  <footer class="flex-none px-4 py-1 border-t border-gray-200 bg-gray-50">
    <p id="statusMessage" class="text-xs text-gray-400"></p>
  </footer>

  <!-- Media controls — shown during playback, fixed at bottom -->
  <div id="mediaControls" class="hidden">
    <button id="btnPauseResume" class="mc-btn mc-btn-primary" title="Pause / Resume">⏸</button>
    <button id="btnBpmMinus"    class="mc-btn mc-btn-default" title="Slower">−</button>
    <span   id="bpmDisplay">165 BPM</span>
    <button id="btnBpmPlus"     class="mc-btn mc-btn-default" title="Faster">+</button>
    <button id="btnMediaStop"   class="mc-btn mc-btn-danger"  title="Stop">■ Stop</button>
  </div>

  <!-- ES6 module entry point — runs after all globals above are ready -->
  <script type="module" src="js/psalms/app.js"></script>
</body>

</html>
