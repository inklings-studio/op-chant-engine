<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!--
    IMPORTANT: Open via HTTP server, NOT file://.
    Exsurge uses Canvas for text measurement; Web Audio requires a real origin.
    Run: http-server -a localhost -p 80
    Then open: http://localhost/v2/transcriber.html
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GABC Transcriber — v2</title>

  <link rel="stylesheet" href="css/output.css" />

  <link rel="stylesheet" href="css/transcriber.css" />

  <!--
    Global libraries must load as classic scripts before the ES6 module.
    Order: Tone → tones (audio) → exsurge (rendering) → saveSvgAsPng (export)
  -->
  <script src="../js/Tone.min.js"></script>
  <script src="../js/tones.js"></script>
  <script src="../exsurge.min.js"></script>
  <script src="../saveSvgAsPng.js"></script>
</head>

<body class="h-screen flex flex-col bg-white text-gray-900 overflow-hidden">

  <!-- TOOLBAR -->
  <header class="flex-none flex items-center justify-between px-4 py-2 border-b border-gray-200 bg-gray-50">
    <h1 class="text-sm font-semibold text-gray-700 tracking-wide uppercase">
      GABC Transcriber
      <span class="ml-2 text-xs font-normal text-gray-400">v2</span>
    </h1>
    <div class="flex items-center gap-2">
      <button id="btnExportPdf"
        class="px-3 py-1 text-xs font-medium rounded bg-blue-600 text-white hover:bg-blue-700 active:bg-blue-800 transition-colors">
        PDF
      </button>
      <button id="btnDownloadPng"
        class="px-3 py-1 text-xs font-medium rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-colors">
        PNG
      </button>
      <button id="btnDownloadSvg"
        class="px-3 py-1 text-xs font-medium rounded border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 active:bg-gray-100 transition-colors">
        SVG
      </button>
    </div>
  </header>

  <!-- TWO-PANE LAYOUT -->
  <main class="flex-1 flex overflow-hidden">

    <!-- Editor pane -->
    <section class="w-2/5 flex flex-col border-r border-gray-200 min-w-0">

      <!-- Tab bar -->
      <div class="flex-none flex border-b border-gray-200 bg-gray-50">
        <button id="tabEditorBtn"
          class="tab-btn tab-btn-active px-4 py-2 text-xs font-medium border-b-2 border-blue-500 text-gray-700">
          Editor
        </button>
        <button id="tabGabcBtn"
          class="tab-btn px-4 py-2 text-xs font-medium border-b-2 border-transparent text-gray-500 hover:text-gray-700">
          GABC
        </button>
      </div>

      <!-- Tab 1: Structured editor -->
      <div id="editorTab" class="flex-1 flex flex-col overflow-y-auto p-3 min-w-0">

        <!-- Controls -->
        <div class="pb-3 mb-3 border-b border-gray-200 flex items-center w-full">
          <!-- Left grid: label | control -->
          <div style="display:grid; grid-template-columns:auto auto; gap:6px 8px; align-items:center;">
            <span class="text-xs text-gray-600 text-right">Language</span>
            <select id="editorLang" class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <!-- options populated by editor.js from language registry -->
            </select>
            <span class="text-xs text-gray-600 text-right">Annotation</span>
            <input type="text" id="editorAnnotation" spellcheck="false"
              class="border border-gray-300 rounded px-2 py-1 text-xs text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400"
              placeholder="e.g. Ant." style="width:90px;" />
            <span class="text-xs text-gray-600 text-right">Clef</span>
            <select id="editorClef" class="border border-gray-300 rounded px-2 py-1 text-xs font-mono text-gray-700 bg-white focus:outline-none focus:ring-1 focus:ring-blue-400">
              <option>c1</option><option>c2</option><option>c3</option>
              <option selected>c4</option><option>f3</option><option>f4</option>
            </select>
          </div>
          <!-- Right grid: label | checkbox — pushed to far right -->
          <div style="display:grid; grid-template-columns:auto auto; gap:6px 8px; align-items:center; margin-left:auto;">
            <label class="text-xs text-gray-600 cursor-pointer select-none" for="editorStrophic">Strophic Copy</label>
            <input type="checkbox" id="editorStrophic" class="accent-blue-600">
            <label class="text-xs text-gray-600 cursor-pointer select-none" for="editorLargeInitial">Large Initial</label>
            <input type="checkbox" id="editorLargeInitial" class="accent-blue-600">
            <label class="text-xs text-gray-600 cursor-pointer select-none" for="editorStanzaNumbers">Stanza Numbers</label>
            <input type="checkbox" id="editorStanzaNumbers" class="accent-blue-600">
          </div>
        </div>

        <!-- Raw text input + Build -->
        <div id="editorTextInputArea" class="flex gap-2 mb-2">
          <textarea id="editorRawText" spellcheck="false"
            class="flex-1 h-24 resize-y border border-gray-300 rounded px-2 py-1.5 text-xs font-mono leading-relaxed focus:outline-none focus:ring-1 focus:ring-blue-400"
            placeholder="Paste hymn text here…"></textarea>
          <button id="editorBuildBtn"
            class="self-end px-3 py-1.5 bg-blue-600 text-white text-xs font-medium rounded hover:bg-blue-700 active:bg-blue-800">
            Build
          </button>
        </div>

        <!-- Edit text toggle — shown after first Build -->
        <button id="editorEditToggle"
          class="hidden self-start mb-2 px-2 py-0.5 text-xs text-blue-600 border border-blue-300 rounded hover:bg-blue-50">
          Edit text
        </button>

        <!-- Dynamic stanza rows injected here by editor.js -->
        <div id="editorStanzas"></div>

      </div>

      <!-- Tab 2: Raw GABC — gabcEditor ID preserved exactly for app.js -->
      <div id="gabcTab" class="hidden flex-1 flex flex-col min-w-0">
        <textarea id="gabcEditor" spellcheck="false" autocorrect="off" autocapitalize="none"
          class="flex-1 resize-none p-3 font-mono text-sm leading-relaxed text-gray-800 bg-white focus:outline-none focus:ring-1 focus:ring-inset focus:ring-blue-400"
          placeholder="Paste or type integrated GABC here…"></textarea>
      </div>

    </section>

    <!-- Preview pane -->
    <section class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <div class="flex-none px-3 py-2 border-b border-gray-100 bg-gray-50">
        <span class="text-xs font-medium text-gray-500 uppercase tracking-wide">Preview</span>
      </div>
      <div id="chantPreview" class="flex-1 overflow-y-auto p-4">
        <p id="previewPlaceholder" class="text-sm text-gray-400 italic mt-8 text-center">
          Enter GABC in the editor to see a preview.
        </p>
      </div>
    </section>

  </main>

  <!-- STATUS BAR -->
  <footer class="flex-none px-4 py-1 border-t border-gray-200 bg-gray-50">
    <p id="statusMessage" class="text-xs text-gray-400"></p>
  </footer>

  <!-- Hidden PDF export form -->
  <form id="pdfForm" target="_blank" method="post" action="https://www.sourceandsummit.com/editor/legacy/process.php"
    class="hidden">
    <input type="hidden" id="pdfGabc" name="gabc[]" />
    <input type="hidden" name="width" value="7.5" />
    <input type="hidden" name="height" value="11" />
    <input type="hidden" name="croppdf" value="false" />
    <input type="hidden" name="spacing" value="vichi" />
    <input type="hidden" name="font" value="GaramondPremierPro" />
    <input type="hidden" name="fontsize" value="20" />
    <input type="hidden" name="fmt" value="pdf" />
  </form>

  <!-- Media controls — shown during playback, fixed at bottom -->
  <div id="mediaControls" class="hidden">
    <button id="btnPauseResume" class="mc-btn mc-btn-primary" title="Pause / Resume">⏸</button>
    <button id="btnBpmMinus"    class="mc-btn mc-btn-default" title="Slower">−</button>
    <span   id="bpmDisplay">165 BPM</span>
    <button id="btnBpmPlus"     class="mc-btn mc-btn-default" title="Faster">+</button>
    <button id="btnMediaStop"   class="mc-btn mc-btn-danger"  title="Stop">■ Stop</button>
  </div>

  <!-- ES6 module entry point — runs after all globals above are ready -->
  <script type="module" src="js/transcriber/app.js"></script>
</body>

</html>
